<div class="content">
  <aside>
    <app-task-form (taskAdded)="addTask($event)" />

    <div class="filters">
      <h3>Ara & Filtrele</h3>

      <div class="form-group">
        <label>Ara</label>
        <input type="text" placeholder="Görev ara..." (input)="onSearch($event)" />
      </div>

      <div class="form-group">
        <label>Durum</label>
        <select (change)="setFilterStatus($event)">
          <option value="all">Tümü</option>
          <option value="todo">Bekliyor</option>
          <option value="in-progress">Devam ediyor</option>
          <option value="done">Tamamlandı</option>
        </select>
      </div>

      <div class="form-group">
        <label>Öncelik</label>
        <select (change)="setFilterPriority($event)">
          <option value="all">Tümü</option>
          <option value="low">Düşük</option>
          <option value="medium">Orta</option>
          <option value="high">Yüksek</option>
        </select>
      </div>
    </div>
  </aside>

  <main class="task-grid">
    @for (task of tasks(); track task.id) {
      <app-task-card
        [task]="task"
        [isSelected]="selectedTask()?.id === task.id"
        (taskSelected)="onTaskSelected($event)"
        (taskDeleted)="deleteTask($event)"
        (statusUpdated)="updateStatus($event)"
      />
    }

    @if (tasks().length === 0) {
      <p class="empty">Görev bulunamadı.</p>
    }
  </main>
</div>
