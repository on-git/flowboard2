<div class="app-container">
  <header>
    <h1>{{ title() }}</h1>
    <div class="stats">
      <span class="stat todo">{{ todoCount() }} bekliyor</span>
      <span class="stat in-progress">{{ inProgressCount() }} devam ediyor</span>
      <span class="stat done">{{ doneCount() }} tamamlandı</span>
    </div>
  </header>

  <div class="content">
    <aside>
      <app-task-form (taskAdded)="addTask($event)" />
    </aside>

    <main class="task-grid">
      @for (task of tasks(); track task.id) {
        <app-task-card
          [task]="task"
          [isSelected]="selectedTask()?.id === task.id"
          (taskSelected)="onTaskSelected($event)"
          (taskDeleted)="deleteTask($event)"
          (statusUpdated)="updateStatus($event)"
        />
      }
    </main>
  </div>
</div>
