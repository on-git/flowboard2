<div class="app-container">
  <header>
    <div class="header-top">
      <h1>{{ title() }}</h1>
      <nav>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Liste
        </a>
        <a routerLink="/board" routerLinkActive="active"> Board </a>
      </nav>
    </div>
    <div class="stats">
      <span class="stat todo">{{ todoCount() }} bekliyor</span>
      <span class="stat in-progress">{{ inProgressCount() }} devam ediyor</span>
      <span class="stat done">{{ doneCount() }} tamamlandı</span>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
