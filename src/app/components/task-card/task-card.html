<div
  class="task-card"
  [class]="task().status"
  [class.selected]="isSelected()"
  (click)="onCardClick()"
>
  <div class="task-header">
    <span class="priority" [class]="'priority-' + task().priority">
      {{ task().priority }}
    </span>
    <button class="delete-btn" (click)="onDeleteClick($event)">✕</button>
  </div>
  <h3 (click)="goToDetail($event)">{{ task().title }}</h3>
  <p>{{ task().description }}</p>
  <div class="task-footer">
    <select (change)="onStatusChange($event)" (click)="$event.stopPropagation()">
      <option value="todo" [selected]="task().status === 'todo'">Bekliyor</option>
      <option value="in-progress" [selected]="task().status === 'in-progress'">Devam ediyor</option>
      <option value="done" [selected]="task().status === 'done'">Tamamlandı</option>
    </select>
  </div>
</div>
